name: CI

on:
  push:
    branches: [main]
    paths: ['src/**', 'package.json', 'pnpm-lock.yaml', '.github/workflows/ci.yml']
  pull_request:
    branches: [main]
    paths: ['src/**', 'package.json', 'pnpm-lock.yaml', '.github/workflows/ci.yml']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro check
        run: pnpm check

      - name: Type check
        run: pnpm lint
